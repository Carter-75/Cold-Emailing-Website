<div #container class="opacity-0 translate-y-4">
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <div class="lg:col-span-8 space-y-8">
      <!-- Command Center Hero -->
      <div class="glass-premium glass-interactive p-1 group">
        <div class="glass-edge-highlight"></div>
        <div class="absolute inset-0 bg-gradient-to-br from-accent-blue/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-1000"></div>
        
        <div class="relative p-12 flex flex-col items-center gap-10">
          <div class="flex-1 text-center">
            <div class="mb-6 inline-flex items-center gap-2 rounded-full bg-accent-blue/10 px-4 py-1.5 text-[10px] font-black uppercase tracking-[0.2em] text-accent-blue border border-accent-blue/20">
              Status: {{ outreach.status() === 'running' ? 'Active' : 'Ready' }}
            </div>
            <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter italic mb-6">
              Smart <span class="text-gradient-stripe">Outreach</span>
            </h1>
            <p class="max-w-2xl mx-auto mb-10 leading-relaxed font-medium">
              <span class="text-protection text-white/60">Everything is set up and ready for your next campaign.</span>
            </p>
            <div class="flex flex-wrap items-center gap-4 justify-center">
              <button (click)="toggleOutreach()" 
                      [ngClass]="outreach.status() === 'running' ? 'bg-rose-500 hover:bg-rose-600 shadow-rose-500/20' : 'bg-emerald-500 hover:bg-emerald-600 shadow-emerald-500/20'"
                      class="px-8 py-4 rounded-2xl text-black font-black uppercase tracking-widest text-[10px] transition-all hover:scale-[1.02] active:scale-[0.98] shadow-xl">
                {{ outreach.status() === 'running' ? 'Stop Sending' : 'Start Sending' }}
              </button>
              <button (click)="sendTestEmail()" class="px-8 py-4 rounded-2xl bg-white/5 border border-white/10 text-white font-black uppercase tracking-widest text-[10px] hover:bg-white/10 transition-all shadow-xl">
                Send Test
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Statistics Grid -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <div *ngFor="let stat of realStats()" class="glass-premium glass-interactive p-8 group cursor-pointer">
        <div class="glass-edge-highlight"></div>
        <p class="text-[10px] font-black uppercase tracking-[0.2em] mb-4">
          <span class="text-protection text-white/30">{{ stat.label }}</span>
        </p>
        <div class="flex items-end justify-between">
          <h2 class="text-5xl font-black italic tracking-tighter">{{ stat.value }}</h2>
          <span *ngIf="stat.trend !== '0'" class="text-[10px] font-bold text-emerald-500 bg-emerald-500/10 px-2 py-1 rounded-lg">+{{ stat.trend }}%</span>
        </div>
      </div>
    </div>
    </div>

    <!-- Sidebar / Recent Activity -->
    <div class="lg:col-span-4 space-y-8">
      <div class="glass-premium glass-interactive p-8 h-full min-h-[500px] flex flex-col">
        <div class="glass-edge-highlight"></div>
        <div class="flex items-center justify-between mb-8">
          <h3 class="text-xs font-black uppercase tracking-widest italic">Live Activity</h3>
          <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div>
        </div>

        <div class="space-y-4 flex-1 overflow-y-auto no-scrollbar">
          <div *ngFor="let log of realLogs()" class="activity-item opacity-0 flex items-center gap-6 p-5 rounded-2xl bg-white/[0.01] border border-white/5 hover:bg-white/[0.04] transition-all group">
            <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center text-white/40 group-hover:bg-accent-blue/10 group-hover:text-accent-blue transition-colors">
              <lucide-icon [name]="log.icon" class="w-4 h-4"></lucide-icon>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-[11px] font-bold text-white/80 truncate mb-1">{{ log.msg }}</p>
              <p class="text-[9px] font-black uppercase tracking-widest">
                <span class="text-protection text-white/20">{{ log.time }}</span>
              </p>
            </div>
          </div>
          
          <div *ngIf="!realLogs().length" class="flex-1 flex flex-col items-center justify-center text-center opacity-40">
            <p class="text-xs font-black uppercase tracking-widest">No activity yet</p>
          </div>
        </div>

        <button class="w-full mt-8 py-4 rounded-2xl bg-white/5 border border-white/10 text-[10px] font-black uppercase tracking-widest text-white/40 hover:text-white transition-all">
          View Full History
        </button>
      </div>
    </div>

  </div>
</div>
