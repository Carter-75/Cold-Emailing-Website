<div #container class="opacity-0 translate-y-4">
  <div class="space-y-8">
    <!-- Command Center Hero -->
    <div class="glass-premium glass-interactive p-1 group">
      <div class="glass-edge-highlight"></div>
      <div class="absolute inset-0 bg-gradient-to-br from-accent-blue/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-1000"></div>
      
      <div class="relative p-12 md:p-20 flex flex-col items-center gap-10">
        <div class="flex-1 text-center">
          <div class="mb-6 inline-flex items-center gap-2 rounded-full bg-accent-blue/10 px-4 py-1.5 text-[10px] font-black uppercase tracking-[0.2em] text-accent-blue border border-accent-blue/20">
            Status: {{ outreach.status() === 'running' ? 'Active' : 'Ready' }}
          </div>
          <h1 class="text-5xl md:text-8xl font-black uppercase tracking-tighter italic mb-6">
            Smart <span class="text-gradient-stripe">Outreach</span>
          </h1>
          <p class="text-white/80 max-w-3xl mx-auto mb-10 text-lg leading-relaxed font-medium">
            Your autonomous outreach engine is standing by. Monitor telemetry and manage the conversation pipeline from your command center.
          </p>
          <div class="flex flex-wrap items-center gap-6 justify-center">
            <button (click)="toggleOutreach()" 
                    [ngClass]="outreach.status() === 'running' ? 'bg-rose-500 hover:bg-rose-600 shadow-rose-500/20' : 'bg-emerald-500 hover:bg-emerald-600 shadow-emerald-500/20'"
                    class="px-12 py-5 rounded-2xl text-black font-black uppercase tracking-widest text-[11px] transition-all hover:scale-[1.02] active:scale-[0.98] shadow-2xl">
              {{ outreach.status() === 'running' ? 'Deactivate System' : 'Activate Engine' }}
            </button>
            <button (click)="sendTestEmail()" class="px-12 py-5 rounded-2xl bg-white/5 border border-white/10 text-white font-black uppercase tracking-widest text-[11px] hover:bg-white/10 transition-all shadow-2xl">
              Execute Test
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Statistics Grid -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <div *ngFor="let stat of realStats()" class="glass-premium glass-interactive p-10 group cursor-pointer">
        <div class="glass-edge-highlight"></div>
        <p class="text-[11px] font-black uppercase tracking-[0.2em] text-white/30 mb-6">{{ stat.label }}</p>
        <div class="flex items-end justify-between">
          <h2 class="text-6xl font-black italic tracking-tighter">{{ stat.value }}</h2>
          <div class="flex flex-col items-end gap-1">
            <span *ngIf="stat.trend !== '0'" class="text-[11px] font-bold text-emerald-500 bg-emerald-500/10 px-3 py-1.5 rounded-xl">+{{ stat.trend }}%</span>
            <span class="text-[8px] font-black uppercase tracking-widest text-white/20">Real-time Telemetry</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
