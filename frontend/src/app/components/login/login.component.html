<div class="min-h-screen flex flex-col lg:flex-row relative overflow-hidden bg-[#0A0A0B] text-white">
  
  <div class="w-full lg:w-[450px] lg:border-r border-white/5 bg-white/[0.02] backdrop-blur-2xl p-8 lg:p-12 shrink-0 flex flex-col justify-center z-10 min-h-screen relative shadow-2xl">
    <div class="flex justify-center mb-8">
      <div class="w-20 h-20 rounded-3xl bg-gradient-to-br from-orange-600 to-yellow-500 flex items-center justify-center text-3xl shadow-2xl shadow-orange-600/20">🔥</div>
    </div>
    
    <h2 class="text-4xl font-black uppercase tracking-tighter mb-8 text-center">Initialize</h2>
    <p class="text-white/80 mb-10 leading-relaxed text-sm text-center">Access the autonomous networking engine.</p>
    
    <div class="space-y-4">
      <!-- Local Login Form -->
      <div class="space-y-3">
        <div class="relative">
          <lucide-icon name="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-white/60"></lucide-icon>
          <input type="email" [(ngModel)]="credentials.email" placeholder="Email Address" 
                 class="w-full !pl-12 !py-4 bg-white/5 border border-white/10 rounded-xl focus:border-orange-500 outline-none transition-colors">
        </div>
        <div class="relative">
          <lucide-icon name="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-white/60"></lucide-icon>
          <input type="password" [(ngModel)]="credentials.password" placeholder="Password" 
                 class="w-full !pl-12 !py-4 bg-white/5 border border-white/10 rounded-xl focus:border-orange-500 outline-none transition-colors"
                 (keyup.enter)="onAuthSubmit()">
        </div>
        
        <button (click)="onAuthSubmit()" 
                class="w-full !py-4 bg-white text-black font-black uppercase tracking-widest text-xs rounded-xl shadow-[0_0_20px_rgba(255,255,255,0.3)] hover:shadow-[0_0_30px_rgba(255,255,255,0.5)] transition-all flex items-center justify-center gap-3 group">
          <span>Authorize Session</span>
          <lucide-icon name="arrow-right" class="w-4 h-4 transition-transform group-hover:translate-x-1"></lucide-icon>
        </button>
      </div>

      <div class="flex items-center gap-4 py-4">
        <div class="h-px flex-1 bg-white/5"></div>
        <span class="text-[10px] font-black uppercase tracking-widest text-white/60">OR</span>
        <div class="h-px flex-1 bg-white/5"></div>
      </div>

      <button (click)="loginWithGoogle()" class="w-full !py-5 flex items-center justify-center gap-4 text-[10px] uppercase tracking-widest font-black border border-white/5 bg-white/[0.02] hover:bg-white/10 transition-colors rounded-xl">
        <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sync with Google
      </button>
    </div>

    <div *ngIf="authError()" class="mt-6 p-4 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-500 text-xs font-bold animate-in shake-in duration-300">
      {{ authError() }}
    </div>
  </div>

  <!-- Right: Big Market Wheel -->
  <div class="hidden lg:flex flex-col justify-center items-start gap-4 flex-1 p-12">
    <span class="text-xs font-black uppercase tracking-[0.5em] text-white/60 italic ml-4">Advanced Protocol For</span>
    <div class="relative h-[120px] w-full overflow-hidden flex items-center">
      <ng-container *ngFor="let niche of marketNiches; let i = index">
        <div *ngIf="i === currentNicheIndex()" 
             class="niche-item-large text-7xl xl:text-8xl font-black uppercase tracking-tighter bg-gradient-to-r from-orange-600 via-yellow-500 to-orange-400 bg-clip-text text-transparent absolute left-4">
          {{ niche }}
        </div>
      </ng-container>
    </div>
    <p class="text-white/40 text-xs font-medium max-w-lg mt-8 ml-4 leading-loose tracking-[0.2em] uppercase">
      Leverage autonomous networking engines to scale outreach, automate discovery, and optimize conversion velocity across any niche.
    </p>
  </div>
  
  <div class="absolute bottom-12 right-12 text-right text-[10px] font-black uppercase tracking-[0.4em] text-white/40 italic">
    Systems Active. Monitoring Integrity.
  </div>
</div>
