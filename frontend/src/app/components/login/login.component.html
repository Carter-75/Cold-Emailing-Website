<!-- Login View -->
<div class="min-h-screen flex flex-col lg:flex-row items-center justify-center relative p-6 lg:p-12 gap-10 lg:gap-20 overflow-hidden bg-[#0A0A0B] text-white">
  
  <div class="glass-card max-w-md w-full text-center relative z-10 shrink-0 border border-white/5 bg-white/[0.02] backdrop-blur-2xl p-8 rounded-3xl shadow-2xl">
    <div class="flex justify-center mb-8">
      <div class="w-20 h-20 rounded-3xl bg-gradient-to-br from-orange-600 to-yellow-500 flex items-center justify-center text-3xl shadow-2xl shadow-orange-600/20">🔥</div>
    </div>
    
    <h2 class="text-4xl font-black uppercase tracking-tighter mb-8 h-20">
      Automate your <br/>
      <div class="relative overflow-hidden h-10 inline-block w-full mt-2">
        <span class="absolute inset-0 flex items-center justify-center text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-yellow-500 transition-all duration-500 transform translate-y-0 opacity-100 font-extrabold animate-pulse">
          {{ animatedWords[currentWordIndex()] }}
        </span>
      </div>
    </h2>
    <p class="text-white/80 mb-10 leading-relaxed text-sm">Access the autonomous networking engine.</p>
    
    <div class="space-y-4">
      <div *ngIf="authError()" class="p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-sm mb-4">
        {{ authError() }}
      </div>

      <!-- Local Login Form -->
      <div class="space-y-3">
        <div class="relative">
          <lucide-icon name="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-white/60"></lucide-icon>
          <input type="email" [(ngModel)]="credentials.email" placeholder="Email Address" 
                 class="w-full !pl-12 !py-4 bg-white/5 border border-white/10 rounded-xl focus:border-orange-500 outline-none transition-colors">
        </div>
        <div class="relative">
          <lucide-icon name="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-white/60"></lucide-icon>
          <input type="password" [(ngModel)]="credentials.password" placeholder="Password" 
                 class="w-full !pl-12 !py-4 bg-white/5 border border-white/10 rounded-xl focus:border-orange-500 outline-none transition-colors"
                 (keyup.enter)="onAuthSubmit()">
        </div>
        
        <button (click)="onAuthSubmit()" 
                class="w-full !py-4 bg-gradient-to-r from-orange-600 to-orange-500 text-white font-bold rounded-xl shadow-lg shadow-orange-600/20 hover:shadow-orange-600/40 transition-all flex items-center justify-center gap-3 group">
          <span>Authorize Session</span>
          <lucide-icon name="arrow-right" class="w-4 h-4 transition-transform group-hover:translate-x-1"></lucide-icon>
        </button>
      </div>

      <div class="flex items-center gap-4 py-4">
        <div class="h-px flex-1 bg-white/5"></div>
        <span class="text-[10px] font-black uppercase tracking-widest text-white/60">OR</span>
        <div class="h-px flex-1 bg-white/5"></div>
      </div>

      <button (click)="loginWithGoogle()" class="w-full !py-5 flex items-center justify-center gap-4 text-[10px] uppercase tracking-widest font-black border border-white/5 bg-white/[0.02] hover:bg-white/10 transition-colors rounded-xl">
        <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sync with Google
      </button>
    </div>
  </div>
</div>
