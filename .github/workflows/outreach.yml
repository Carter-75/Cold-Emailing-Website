name: Phoenix Outreach Engine (30m Pacing)

on:
  schedule:
    # Runs every 30 minutes from 13:00 to 23:30 UTC (8:00am - 6:30pm CDT), Mon-Fri
    - cron: '*/30 13-23 * * 1-5'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  outreach:
    runs-on: ubuntu-latest
    env:
      PROD_URL: ${{ secrets.PROD_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Trigger Outreach Chunk
        run: |
          if [ -z "$PROD_URL" ]; then echo "Error: PROD_URL secret is missing"; exit 1; fi
          curl -X GET "$PROD_URL/api/cron/outreach" \
               -H "Authorization: Bearer $CRON_SECRET" \
               -v

      - name: Trigger Maintenance Sweep
        run: |
          if [ -z "$PROD_URL" ]; then echo "Error: PROD_URL secret is missing"; exit 1; fi
          curl -X GET "$PROD_URL/api/cron/maintenance" \
               -H "Authorization: Bearer $CRON_SECRET" \
               -v
